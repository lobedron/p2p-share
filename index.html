<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LOBEDRON SHARE — dark studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            perspective: 1000px;
        }

        #dynamicCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            transition: transform 0.1s ease-out;
        }

        .glass-card {
            background: rgba(18, 20, 24, 0.85);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.02);
            transition: box-shadow 0.3s ease;
            padding: 28px 26px 32px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 32px;
            text-transform: uppercase;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 28px;
        }

        .action-btn {
            background: rgba(20, 22, 27, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #fff;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            min-width: 160px;
            text-align: center;
        }

        .action-btn:hover {
            background: rgba(35, 38, 45, 0.9);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .action-panel {
            display: none;
            margin: 20px 0;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            background: rgba(10, 12, 18, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 18px;
            border-radius: 44px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        textarea {
            border-radius: 24px;
            resize: vertical;
        }

        input:focus, textarea:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: #0c0f16;
        }

        button {
            width: 100%;
            background: rgba(25, 28, 35, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 44px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        button:hover {
            background: #2a2e38;
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .back-btn {
            background: rgba(15, 17, 22, 0.7);
            margin-top: 4px;
        }

        .lobby-container {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .room-id-badge {
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .participant-status {
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
        }

        .chat-area {
            margin: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .messages {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 16px;
            height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 20px;
            width: fit-content;
            max-width: 80%;
            word-break: break-word;
            font-size: 0.85rem;
        }

        .message.own {
            align-self: flex-end;
            background: rgba(100, 108, 255, 0.2);
            border: 1px solid rgba(100,108,255,0.3);
        }

        .chat-input {
            display: flex;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
            margin-bottom: 0;
        }

        .chat-input button {
            width: auto;
            padding: 0 24px;
            margin-bottom: 0;
        }

        .file-panel {
            margin-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .file-row {
            background: rgba(15, 17, 25, 0.7);
            border-radius: 24px;
            padding: 12px 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .file-row a {
            color: #ccc;
            text-decoration: none;
            background: rgba(0,0,0,0.5);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
        }

        .status-text {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-top: 20px;
        }

        .error-msg {
            color: #ff8888;
            background: rgba(255,0,0,0.1);
            padding: 8px;
            border-radius: 20px;
            text-align: center;
            margin-top: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

<canvas id="dynamicCanvas"></canvas>
<div class="cloud" style="width: 500px; height: 500px; top: -10%; left: -10%;"></div>
<div class="cloud" style="width: 700px; height: 700px; bottom: -20%; right: -10%;"></div>

<div class="container" id="mainContainer">
    <div class="glass-card">
        <h1>⚡ LOBESHARE</h1>
        <div class="sub">кастомный файлообменник</div>

        <!-- Начальные кнопки -->
        <div id="startPanel">
            <div class="top-bar">
                <button id="showCreateBtn" class="action-btn">📎 СОЗДАТЬ</button>
                <button id="showJoinBtn" class="action-btn">🔗 ПОДКЛЮЧИТЬСЯ</button>
            </div>
            <div id="dynamicArea"></div>
        </div>

        <!-- Лобби (комната) -->
        <div id="lobbyPanel" class="lobby-container">
            <div class="lobby-header">
                <div class="room-id-badge" id="lobbyRoomId">—</div>
                <div class="participant-status" id="participantStatus">Ожидание подключения...</div>
            </div>
            <div class="chat-area">
                <div class="messages" id="chatMessages"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Сообщение..." disabled>
                    <button id="sendChatBtn" disabled>📤</button>
                </div>
            </div>
            <div id="fileTransferZone" style="display: none;" class="file-panel">
                <div class="input-group">
                    <label>📁 ВЫБРАТЬ ФАЙЛ</label>
                    <input type="file" id="fileInput">
                </div>
                <button id="sendFileBtn">📤 ОТПРАВИТЬ ФАЙЛ</button>
                <div style="margin: 16px 0 8px; font-weight: 500;">📥 ПОЛУЧЕННЫЕ ФАЙЛЫ</div>
                <div id="receivedFilesList"></div>
            </div>
            <button id="leaveLobbyBtn" class="back-btn">← ВЫЙТИ ИЗ КОМНАТЫ</button>
        </div>

        <div id="statusMessage" class="status-text"></div>
    </div>
</div>

<script>
    // ---------- ФОН (звёзды + дождь) ----------
    const canvas = document.getElementById('dynamicCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let stars = [], drops = [];
    let mouseX = 0, mouseY = 0;

    function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        initStars();
        initDrops();
    }

    function initStars() {
        stars = [];
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 2.5,
                alpha: Math.random() * 0.8,
            });
        }
    }

    function initDrops() {
        drops = [];
        for(let i=0; i<100; i++) {
            drops.push({
                x: Math.random() * width,
                y: Math.random() * height,
                len: Math.random() * 20 + 12,
                speed: Math.random() * 8 + 5
            });
        }
    }

    function drawBackground() {
        ctx.clearRect(0, 0, width, height);
        stars.forEach(s => {
            let offsetX = mouseX * 25;
            let offsetY = mouseY * 15;
            let sx = s.x + offsetX;
            let sy = s.y + offsetY;
            if(sx < 0) sx += width;
            if(sx > width) sx -= width;
            if(sy < 0) sy += height;
            if(sy > height) sy -= height;
            ctx.fillStyle = `rgba(255,255,255,${s.alpha * 0.6})`;
            ctx.beginPath();
            ctx.arc(sx, sy, s.size, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 1.2;
        drops.forEach(d => {
            ctx.beginPath();
            ctx.moveTo(d.x, d.y);
            ctx.lineTo(d.x, d.y + d.len);
            ctx.stroke();
            d.y += d.speed;
            if(d.y > height) {
                d.y = -d.len;
                d.x = Math.random() * width;
            }
        });
        requestAnimationFrame(drawBackground);
    }

    window.addEventListener('mousemove', (e) => {
        if(width && height) {
            mouseX = (e.clientX / width) - 0.5;
            mouseY = (e.clientY / height) - 0.5;
            const container = document.getElementById('mainContainer');
            if(container) container.style.transform = `translate(${mouseX * 10}px, ${mouseY * 10}px)`;
        }
    });

    window.addEventListener('resize', () => { resizeCanvas(); });
    resizeCanvas();
    drawBackground();

    // ---------- ЛОГИКА КОМНАТ И ЧАТА ----------
    const SIGNALING_SERVER = 'https://webrtc-signal-server-2.onrender.com';
    let socket = null;
    let currentRoomId = null;
    let isInLobby = false;
    let peerConnection = null;
    let dataChannel = null;
    let isConnected = false;

    const startPanel = document.getElementById('startPanel');
    const lobbyPanel = document.getElementById('lobbyPanel');
    const showCreateBtn = document.getElementById('showCreateBtn');
    const showJoinBtn = document.getElementById('showJoinBtn');
    const dynamicArea = document.getElementById('dynamicArea');
    const statusMsg = document.getElementById('statusMessage');
    const lobbyRoomIdSpan = document.getElementById('lobbyRoomId');
    const participantStatusSpan = document.getElementById('participantStatus');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendChatBtn = document.getElementById('sendChatBtn');
    const fileZone = document.getElementById('fileTransferZone');
    const fileInput = document.getElementById('fileInput');
    const sendFileBtn = document.getElementById('sendFileBtn');
    const receivedFilesList = document.getElementById('receivedFilesList');
    const leaveLobbyBtn = document.getElementById('leaveLobbyBtn');

    let isHost = false;

    function setStatus(text, isError = false) {
        statusMsg.innerHTML = text;
        if (isError) setTimeout(() => {
            if (statusMsg.innerHTML === text) statusMsg.innerHTML = '';
        }, 4000);
    }

    function showError(text) {
        const errDiv = document.createElement('div');
        errDiv.className = 'error-msg';
        errDiv.innerText = text;
        dynamicArea.appendChild(errDiv);
        setTimeout(() => errDiv.remove(), 4000);
        setStatus(text, true);
    }

    function connectToSignaling(callback) {
        if (socket && socket.connected) {
            callback(true);
            return;
        }
        socket = io(SIGNALING_SERVER, { transports: ['websocket', 'polling'] });
        socket.on('connect', () => {
            setStatus('✅ сигнальный сервер готов');
            callback(true);
        });
        socket.on('connect_error', (err) => {
            showError('❌ не удалось подключиться к сигнальному серверу. Проверьте интернет.');
            callback(false);
        });
    }

    function createRoom(roomId) {
        if (!socket || !socket.connected) {
            showError('Нет соединения с сервером');
            return;
        }
        socket.emit('create-room', { roomId }, (response) => {
            if (response && response.error) {
                showError(`Ошибка: ${response.error}`);
                return;
            }
            enterLobby(roomId, true);
        });
    }

    function joinRoom(roomId) {
        if (!socket || !socket.connected) {
            showError('Нет соединения с сервером');
            return;
        }
        socket.emit('join-room', { roomId }, (response) => {
            if (response && response.error) {
                showError(`Ошибка: ${response.error}`);
                return;
            }
            enterLobby(roomId, false);
        });
    }

    function enterLobby(roomId, host) {
        currentRoomId = roomId;
        isHost = host;
        isInLobby = true;
        startPanel.style.display = 'none';
        lobbyPanel.style.display = 'block';
        lobbyRoomIdSpan.innerText = roomId;
        participantStatusSpan.innerText = host ? 'Ожидание подключения участника...' : 'Подключение к комнате...';
        chatMessagesDiv.innerHTML = '';
        chatInput.disabled = true;
        sendChatBtn.disabled = true;
        fileZone.style.display = 'none';
        receivedFilesList.innerHTML = '';

        socket.off('user-joined');
        socket.off('user-left');
        socket.off('room-message');
        socket.off('webrtc-offer');
        socket.off('webrtc-answer');
        socket.off('webrtc-candidate');
        socket.off('file-transfer');

        socket.on('user-joined', (data) => {
            if (data.roomId === currentRoomId) {
                participantStatusSpan.innerText = 'Участник подключился! Устанавливаем соединение...';
                if (isHost) {
                    initWebRTC(true);
                }
            }
        });

        socket.on('user-left', (data) => {
            if (data.roomId === currentRoomId) {
                participantStatusSpan.innerText = 'Участник отключился. Ожидание...';
                if (peerConnection) peerConnection.close();
                peerConnection = null;
                dataChannel = null;
                isConnected = false;
                fileZone.style.display = 'none';
                chatInput.disabled = true;
                sendChatBtn.disabled = true;
            }
        });

        socket.on('room-message', (data) => {
            if (data.roomId === currentRoomId) {
                addChatMessage(data.sender, data.text);
            }
        });

        socket.on('webrtc-offer', async (data) => {
            if (data.roomId === currentRoomId && !isHost) {
                await handleOffer(data.offer);
            }
        });

        socket.on('webrtc-answer', async (data) => {
            if (data.roomId === currentRoomId && isHost && peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });

        socket.on('webrtc-candidate', async (data) => {
            if (data.roomId === currentRoomId && peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch(e) {}
            }
        });

        socket.on('file-transfer', async (data) => {
            if (data.roomId === currentRoomId && data.fileData && data.fileName) {
                const bytes = Uint8Array.from(atob(data.fileData), c => c.charCodeAt(0));
                const blob = new Blob([bytes]);
                const url = URL.createObjectURL(blob);
                const sizeMB = (blob.size / (1024 * 1024)).toFixed(2);
                const row = document.createElement('div');
                row.className = 'file-row';
                row.innerHTML = `<span>📄 ${data.fileName} (${sizeMB} MB)</span><a href="${url}" download="${data.fileName}">⬇️ скачать</a>`;
                receivedFilesList.prepend(row);
                setStatus(`✅ получен файл: ${data.fileName}`);
            }
        });

        if (!host) {
            socket.emit('request-webrtc', { roomId: currentRoomId });
        }
    }

    async function initWebRTC(isInitiator) {
        const configuration = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }]
        };
        peerConnection = new RTCPeerConnection(configuration);

        if (isInitiator) {
            dataChannel = peerConnection.createDataChannel('lobedron-channel');
            setupDataChannel();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('webrtc-offer', { roomId: currentRoomId, offer });
        } else {
            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannel();
            };
        }

        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit('webrtc-candidate', { roomId: currentRoomId, candidate: event.candidate });
            }
        };

        peerConnection.onconnectionstatechange = () => {
            if (peerConnection.connectionState === 'connected') {
                isConnected = true;
                participantStatusSpan.innerText = 'Соединение установлено!';
                chatInput.disabled = false;
                sendChatBtn.disabled = false;
                fileZone.style.display = 'block';
                setStatus('🔗 соединение активно');
            } else if (peerConnection.connectionState === 'failed') {
                isConnected = false;
                participantStatusSpan.innerText = 'Ошибка соединения';
                setStatus('❌ соединение не удалось', true);
            }
        };
    }

    async function handleOffer(offer) {
        if (!peerConnection) {
            await initWebRTC(false);
        }
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.emit('webrtc-answer', { roomId: currentRoomId, answer });
    }

    function setupDataChannel() {
        if (!dataChannel) return;
        dataChannel.onopen = () => {
            isConnected = true;
            participantStatusSpan.innerText = 'Соединение установлено!';
            chatInput.disabled = false;
            sendChatBtn.disabled = false;
            fileZone.style.display = 'block';
        };
        dataChannel.onclose = () => {
            isConnected = false;
            chatInput.disabled = true;
            sendChatBtn.disabled = true;
            fileZone.style.display = 'none';
        };
        dataChannel.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === 'chat') {
                    addChatMessage('собеседник', msg.text);
                } else if (msg.type === 'file') {
                    const bytes = Uint8Array.from(atob(msg.fileData), c => c.charCodeAt(0));
                    const blob = new Blob([bytes]);
                    const url = URL.createObjectURL(blob);
                    const sizeMB = (blob.size / (1024 * 1024)).toFixed(2);
                    const row = document.createElement('div');
                    row.className = 'file-row';
                    row.innerHTML = `<span>📄 ${msg.fileName} (${sizeMB} MB)</span><a href="${url}" download="${msg.fileName}">⬇️ скачать</a>`;
                    receivedFilesList.prepend(row);
                    setStatus(`✅ получен файл: ${msg.fileName}`);
                }
            } catch(e) {}
        };
    }

    function addChatMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        if (sender === 'вы') msgDiv.classList.add('own');
        msgDiv.innerText = `${sender}: ${text}`;
        chatMessagesDiv.appendChild(msgDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    function sendChatMessage(text) {
        if (!isConnected || !dataChannel || dataChannel.readyState !== 'open') {
            setStatus('❌ нет соединения для чата', true);
            return;
        }
        dataChannel.send(JSON.stringify({ type: 'chat', text }));
        addChatMessage('вы', text);
    }

    function sendFile(file) {
        if (!isConnected || !dataChannel || dataChannel.readyState !== 'open') {
            setStatus('❌ нет активного соединения', true);
            return;
        }
        setStatus(`📤 отправка ${file.name}...`);
        const reader = new FileReader();
        reader.onload = () => {
            const base64 = reader.result.split(',')[1];
            dataChannel.send(JSON.stringify({ type: 'file', fileName: file.name, fileData: base64 }));
            setStatus(`✅ файл отправлен`);
            fileInput.value = '';
        };
        reader.readAsDataURL(file);
    }

    function leaveLobby() {
        if (socket && currentRoomId) {
            socket.emit('leave-room', { roomId: currentRoomId });
        }
        if (peerConnection) peerConnection.close();
        peerConnection = null;
        dataChannel = null;
        isConnected = false;
        isInLobby = false;
        currentRoomId = null;
        startPanel.style.display = 'block';
        lobbyPanel.style.display = 'none';
        setStatus('');
    }

    const createPanelHtml = `
        <div id="createPanel" class="action-panel" style="display: block;">
            <div class="input-group">
                <label>ID комнаты</label>
                <input type="text" id="myRoomName" maxlength="20">
            </div>
            <button id="createRoomBtn">✨ СОЗДАТЬ КОМНАТУ</button>
            <button id="backFromCreate" class="back-btn">← НАЗАД</button>
        </div>
    `;
    const joinPanelHtml = `
        <div id="joinPanel" class="action-panel" style="display: block;">
            <div class="input-group">
                <label>ID комнаты</label>
                <input type="text" id="joinRoomName" maxlength="20">
            </div>
            <button id="joinRoomBtn">🔗 ПОДКЛЮЧИТЬСЯ</button>
            <button id="backFromJoin" class="back-btn">← НАЗАД</button>
        </div>
    `;

    function showCreatePanel() {
        dynamicArea.innerHTML = createPanelHtml;
        const createBtn = document.getElementById('createRoomBtn');
        const backBtn = document.getElementById('backFromCreate');
        const roomInput = document.getElementById('myRoomName');
        createBtn.onclick = () => {
            const rid = roomInput.value.trim();
            if (!rid) {
                showError('Введите ID комнаты');
                return;
            }
            if (rid.length > 20) {
                showError('ID не может быть длиннее 20 символов');
                return;
            }
            connectToSignaling((ok) => {
                if (ok) createRoom(rid);
            });
        };
        backBtn.onclick = () => {
            dynamicArea.innerHTML = '';
        };
    }

    function showJoinPanel() {
        dynamicArea.innerHTML = joinPanelHtml;
        const joinBtn = document.getElementById('joinRoomBtn');
        const backBtn = document.getElementById('backFromJoin');
        const roomInput = document.getElementById('joinRoomName');
        joinBtn.onclick = () => {
            const rid = roomInput.value.trim();
            if (!rid) {
                showError('Введите ID комнаты');
                return;
            }
            if (rid.length > 20) {
                showError('ID не может быть длиннее 20 символов');
                return;
            }
            connectToSignaling((ok) => {
                if (ok) joinRoom(rid);
            });
        };
        backBtn.onclick = () => {
            dynamicArea.innerHTML = '';
        };
    }

    showCreateBtn.onclick = showCreatePanel;
    showJoinBtn.onclick = showJoinPanel;
    leaveLobbyBtn.onclick = leaveLobby;
    sendChatBtn.onclick = () => {
        const text = chatInput.value.trim();
        if (text) {
            sendChatMessage(text);
            chatInput.value = '';
        }
    };
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && chatInput.value.trim()) {
            sendChatMessage(chatInput.value.trim());
            chatInput.value = '';
        }
    });
    sendFileBtn.onclick = () => {
        if (fileInput.files.length) sendFile(fileInput.files[0]);
        else setStatus('⚠️ выбери файл', true);
    };

    startPanel.style.display = 'block';
    lobbyPanel.style.display = 'none';
</script>
</body>
</html>
