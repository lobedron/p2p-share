<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LOBEDRON SHARE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a0a14 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(18, 22, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 32px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a0a0ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #6b7280;
            margin-bottom: 32px;
            font-size: 0.85rem;
        }
        .id-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 24px;
        }
        .id-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6b7280;
            margin-bottom: 8px;
        }
        #myId {
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-all;
            background: #0a0e16;
            padding: 12px;
            border-radius: 12px;
            color: #4ade80;
        }
        .input-group {
            margin-bottom: 16px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            background: #0a0e16;
            border: 1px solid #1f2937;
            border-radius: 24px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #4ade80;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            border: 1px solid #374151;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 16px;
        }
        button:hover {
            border-color: #4ade80;
            background: #1f2937;
            transform: translateY(-1px);
        }
        .file-area {
            border-top: 1px solid #1f2937;
            padding-top: 24px;
            margin-top: 8px;
        }
        .status {
            background: #0a0e16;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            font-size: 0.8rem;
            color: #9ca3af;
            margin: 16px 0;
        }
        .received-file {
            background: #0a0e16;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .received-file a {
            color: #4ade80;
            text-decoration: none;
            font-weight: 500;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #4b5563;
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ LOBEDRON SHARE</h1>
    <div class="sub">Прямая передача файлов — без серверов</div>

    <div class="id-card">
        <div class="id-label">🔑 ТВОЙ ID ДЛЯ ПОДКЛЮЧЕНИЯ</div>
        <div id="myId">Загрузка...</div>
    </div>

    <div class="input-group">
        <input type="text" id="peerIdInput" placeholder="Вставь ID друга">
    </div>
    <button id="connectBtn">🔗 ПОДКЛЮЧИТЬСЯ</button>

    <div id="transferBlock" style="display: none;">
        <div class="file-area">
            <input type="file" id="fileInput" style="margin-bottom: 16px;">
            <button id="sendBtn">📤 ОТПРАВИТЬ ФАЙЛ</button>
            <div style="margin: 20px 0 10px; font-weight: 600;">📥 ПОЛУЧЕННЫЕ ФАЙЛЫ</div>
            <div id="receivedList"></div>
        </div>
    </div>

    <div id="status" class="status">🟢 Ожидание подключения...</div>
    <footer>LOBEDRON P2P — файлы идут напрямую, никто не видит</footer>
</div>

<script type="importmap">
    {
        "imports": {
            "trystero": "https://esm.run/trystero"
        }
    }
</script>

<script type="module">
    import { joinRoom } from 'trystero';
    
    let currentRoom = null;
    let currentPeerId = null;
    let sendAction = null;

    const statusDiv = document.getElementById('status');
    const myIdDiv = document.getElementById('myId');
    const peerIdInput = document.getElementById('peerIdInput');
    const connectBtn = document.getElementById('connectBtn');
    const transferBlock = document.getElementById('transferBlock');
    const fileInput = document.getElementById('fileInput');
    const sendBtn = document.getElementById('sendBtn');
    const receivedList = document.getElementById('receivedList');

    // Уникальный идентификатор твоего приложения
    const APP_ID = 'lobedron-share-v1';
    const ROOM_ID = 'lobedron-main-room';

    // Функция для генерации короткого ID (для отображения)
    function generateShortId() {
        return Math.random().toString(36).substring(2, 10);
    }

    // Получаем или создаём ID для этого экземпляра
    let storedPeerId = localStorage.getItem('lobedron_peer_id');
    if (!storedPeerId) {
        storedPeerId = generateShortId();
        localStorage.setItem('lobedron_peer_id', storedPeerId);
    }
    currentPeerId = storedPeerId;
    myIdDiv.innerText = currentPeerId;

    // Функция для подключения к комнате
    function connectToRoom() {
        if (currentRoom) {
            // Если уже есть подключение, отключаемся
            // (В Trystero нет явного метода disconnect, но мы можем просто пересоздать комнату)
        }
        
        // Создаём/подключаемся к комнате. Стратегия по умолчанию - Nostr.
        // Альтернативы: 'trystero/torrent', 'trystero/ipfs', 'trystero/mqtt'
        const room = joinRoom({ appId: APP_ID }, ROOM_ID);
        
        // [sendFile, onReceiveFile] = room.makeAction('file-transfer')
        const [sendFile, onReceiveFile] = room.makeAction('file-transfer');
        
        // Обработчик получения файла
        onReceiveFile(async (data, peerId) => {
            console.log(`Получен файл от ${peerId}`, data);
            // data - это объект, который мы отправили: { file: ArrayBuffer, name: string, size: number }
            if (data && data.file) {
                const blob = new Blob([data.file]);
                const url = URL.createObjectURL(blob);
                const fileSizeMB = (data.size / 1024 / 1024).toFixed(2);
                const div = document.createElement('div');
                div.className = 'received-file';
                div.innerHTML = `
                    <span>📄 ${data.name} (${fileSizeMB} MB)</span>
                    <a href="${url}" download="${data.name}">⬇️ Скачать</a>
                `;
                receivedList.prepend(div);
                statusDiv.innerHTML = `📥 Получен файл: ${data.name}`;
            }
        });
        
        // Обработчик присоединения нового пира (пользователя) к комнате
        room.onPeerJoin((peerId) => {
            console.log(`Пир присоединился: ${peerId}`);
            if (peerId !== currentPeerId) {
                statusDiv.innerHTML = `🔗 Подключено к ${peerId}!`;
                transferBlock.style.display = 'block';
                currentRoom = room;
                sendAction = sendFile;
            }
        });
        
        // Обработчик отключения пира
        room.onPeerLeave((peerId) => {
            console.log(`Пир отключился: ${peerId}`);
            if (peerId !== currentPeerId) {
                statusDiv.innerHTML = '🔌 Соединение разорвано.';
                transferBlock.style.display = 'none';
                currentRoom = null;
                sendAction = null;
            }
        });
        
        // Получаем список всех пиров в комнате
        const peers = room.getPeers();
        if (peers.length > 0) {
            // Если в комнате уже есть кто-то, кроме нас, считаем, что подключились
            const otherPeers = peers.filter(p => p !== currentPeerId);
            if (otherPeers.length > 0) {
                statusDiv.innerHTML = `🔗 Уже подключено к ${otherPeers[0]}!`;
                transferBlock.style.display = 'block';
                currentRoom = room;
                sendAction = sendFile;
            }
        }
        
        // Сохраняем комнату, даже если пока нет других пиров
        currentRoom = room;
        sendAction = sendFile;
        statusDiv.innerHTML = '✅ Готов к подключению. Отправь свой ID другу.';
    }

    // Инициализируем подключение при загрузке страницы
    connectToRoom();

    // Обработчик кнопки "Подключиться" (логика для ручного подключения)
    connectBtn.addEventListener('click', () => {
        const remoteId = peerIdInput.value.trim();
        if (!remoteId) {
            statusDiv.innerHTML = '⚠️ Введите ID друга.';
            return;
        }
        
        if (currentRoom) {
            // Принудительно показываем, что мы пытаемся подключиться
            statusDiv.innerHTML = `🔄 Подключение к ${remoteId}...`;
            // В Trystero нет явного метода "connect", так как подключение происходит через общую комнату.
            // Просто выводим сообщение, что нужно ждать, пока друг тоже войдёт в комнату.
            setTimeout(() => {
                statusDiv.innerHTML = `✅ Ожидаем подключения ${remoteId}. Убедись, что он тоже открыл эту страницу.`;
            }, 2000);
        }
    });

    // Отправка файла
    sendBtn.addEventListener('click', async () => {
        if (!sendAction) {
            statusDiv.innerHTML = '❌ Нет активного подключения. Сначала дождитесь подключения друга.';
            return;
        }
        
        const file = fileInput.files[0];
        if (!file) {
            statusDiv.innerHTML = '⚠️ Выбери файл для отправки.';
            return;
        }
        
        statusDiv.innerHTML = `📤 Отправка "${file.name}"...`;
        
        try {
            const arrayBuffer = await file.arrayBuffer();
            // Используем действие sendAction, которое мы получили из комнаты
            await sendAction({
                file: arrayBuffer,
                name: file.name,
                size: file.size,
                type: file.type
            });
            statusDiv.innerHTML = `✅ Файл "${file.name}" отправлен!`;
            fileInput.value = ''; // Очищаем поле выбора файла
        } catch (error) {
            console.error('Ошибка отправки:', error);
            statusDiv.innerHTML = `❌ Ошибка при отправке файла.`;
        }
    });
</script>
</body>
</html>
